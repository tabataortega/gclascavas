<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grand Cru Las Cavas - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:28px 40px;border-bottom:2px solid #6c2bd9;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:26px;font-weight:700;color:#fff}.header p{color:#a0a0c0;font-size:14px;margin-top:4px}
.container{max-width:1400px;margin:0 auto;padding:30px 24px}
.filter-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.filter-row label{font-size:13px;color:#8888aa;text-transform:uppercase;letter-spacing:1px}
.filter-row select{background:#12122a;color:#e0e0e0;border:1px solid #2a2a4a;border-radius:8px;padding:8px 14px;font-size:14px;font-family:inherit;outline:none;cursor:pointer}
.filter-row select:focus{border-color:#6c2bd9}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:32px}
.kpi-row.five-col{grid-template-columns:repeat(5,1fr)}
.kpi-row.three-col{grid-template-columns:repeat(3,1fr)}
.kpi-row.six-col{grid-template-columns:repeat(6,1fr)}
.kpi-card{background:linear-gradient(135deg,#1a1a2e,#1e1e38);border:1px solid #2a2a4a;border-radius:14px;padding:22px;text-align:center;transition:transform .2s}
.kpi-card:hover{transform:translateY(-3px)}
.kpi-label{font-size:12px;color:#8888aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700;color:#fff}.kpi-sub{font-size:13px;margin-top:6px}
.kpi-up{color:#00e676}.kpi-down{color:#ff5252}
.section-title{font-size:18px;font-weight:600;color:#c0c0e0;margin-bottom:16px;padding-left:12px;border-left:3px solid #6c2bd9}
.table-wrapper{background:#1a1a2e;border-radius:14px;border:1px solid #2a2a4a;overflow-x:auto;margin-bottom:36px;padding:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#12122a;color:#8888cc;padding:12px 14px;text-align:right;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.8px;border-bottom:2px solid #6c2bd9;white-space:nowrap}
thead th:first-child{text-align:left}
tbody td{padding:11px 14px;text-align:right;border-bottom:1px solid #1e1e3a;white-space:nowrap}
tbody td:first-child{text-align:left;color:#b0b0d0;font-weight:500}tbody tr:hover{background:#1f1f38}
.var-positive{color:#00e676;font-weight:600}.var-negative{color:#ff5252;font-weight:600}.var-neutral{color:#888}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.chart-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:14px;padding:24px}
.chart-card.full-width{grid-column:1/-1}.chart-card h3{font-size:15px;color:#c0c0e0;margin-bottom:16px;font-weight:600}
.chart-container{position:relative;height:320px}
.sku-tables-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:36px}
.sku-rank{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;margin-right:8px;flex-shrink:0}
.rank-gold{background:linear-gradient(135deg,#ffd700,#b8860b);color:#1a1a2e}
.rank-silver{background:linear-gradient(135deg,#c0c0c0,#808080);color:#1a1a2e}
.rank-bronze{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff}
.rank-default{background:#2a2a4a;color:#8888aa}
.sku-name-cell{display:flex;align-items:center}.sku-name-text{white-space:normal;word-break:break-word;line-height:1.3;max-width:320px}
.table-header-label{font-size:16px;font-weight:600;color:#c0c0e0;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.badge-top{background:#00e676;color:#0f0f1a;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-bottom{background:#ff5252;color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-warn{background:#ffa500;color:#1a1a2e;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.tab-bar{display:flex;gap:8px;margin-bottom:20px}
.tab-btn{background:#1a1a2e;color:#8888aa;border:1px solid #2a2a4a;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.tab-btn.active{background:#6c2bd9;color:#fff;border-color:#6c2bd9}
.tab-content{display:none}.tab-content.active{display:block}
.store-chip{display:inline-block;padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;margin-right:6px}
.chip-cb{background:#2d6a4f;color:#b7e4c7}.chip-pin{background:#1d3557;color:#a8dadc}.chip-dd{background:#6c2bd9;color:#e0d0ff}
.insight-box{background:linear-gradient(135deg,#1a1a2e,#1e1e38);border:1px solid #2a2a4a;border-radius:14px;padding:24px;margin-bottom:28px}
.insight-box h3{font-size:15px;color:#c0c0e0;margin-bottom:14px;font-weight:600}
.insight-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.5}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:32px}
.compare-card{background:linear-gradient(135deg,#1a1a2e,#1e1e38);border:1px solid #2a2a4a;border-radius:14px;padding:20px}
.compare-card h4{font-size:14px;color:#c0c0e0;margin-bottom:12px;text-align:center}
.compare-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #1e1e3a}
.compare-label{color:#8888aa}.compare-val{color:#fff;font-weight:600}
.outlier-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:36px}
.clickable-row{cursor:pointer}.clickable-row:hover{background:#2a2a4a!important}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:9999;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:#1a1a2e;border:2px solid #6c2bd9;border-radius:16px;padding:32px;width:700px;max-height:85vh;overflow-y:auto}
.modal-box h2{color:#fff;margin-bottom:8px;font-size:20px}
.modal-box .close-btn{float:right;background:none;border:none;color:#888;font-size:24px;cursor:pointer}
.modal-box .close-btn:hover{color:#fff}
.vend-dash{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.vend-dash .kpi-card{padding:16px}
.vend-dash .kpi-value{font-size:22px}
.status-toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;padding:4px 12px;border-radius:16px;border:none;font-family:inherit;transition:all .2s}
.status-toggle.ativo{background:#2d6a4f;color:#b7e4c7}.status-toggle.inativo{background:#4a1a1a;color:#ff8a8a}
.status-toggle:hover{opacity:.8;transform:scale(1.05)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.ativo{background:#00e676}.status-dot.inativo{background:#ff5252}
@media(max-width:1100px){.outlier-grid{grid-template-columns:1fr}}
@media(max-width:900px){.kpi-row,.compare-grid,.vend-dash{grid-template-columns:repeat(2,1fr)}.charts-grid,.sku-tables-grid{grid-template-columns:1fr}.filter-row{flex-direction:column;align-items:flex-start}}
@media(max-width:600px){.kpi-row,.compare-grid,.vend-dash{grid-template-columns:1fr}}
</style>
</head>
<body>

<style>
.login-container{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0f1a;display:flex;align-items:center;justify-content:center;z-index:10000}
.login-box{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:48px 40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-box .logo{font-size:28px;font-weight:800;color:#fff;letter-spacing:2px;margin-bottom:4px}
.login-box .logo span{color:#6c2bd9}
.login-box .subtitle{color:#8888aa;font-size:13px;margin-bottom:32px}
.login-box .input-group{margin-bottom:18px;text-align:left}
.login-box .input-group label{display:block;color:#8888aa;font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.login-box .input-group input{width:100%;padding:12px 16px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;color:#fff;font-size:14px;font-family:inherit;box-sizing:border-box;transition:border-color .2s}
.login-box .input-group input:focus{outline:none;border-color:#6c2bd9}
.btn-login{width:100%;padding:14px;background:#6c2bd9;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s}
.btn-login:hover{background:#7c3ce9}
.btn-login:disabled{background:#3a3a5a;cursor:not-allowed}
.error-msg{color:#ff5252;font-size:13px;margin-top:12px;min-height:20px}
.loading-msg{color:#6c2bd9;font-size:13px;margin-top:12px;display:none}
.login-footer{color:#555;font-size:11px;margin-top:24px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .3s ease-in-out}
</style>

<div class="login-container" id="loginScreen">
  <div class="login-box" id="loginBox">
    <div class="logo">GRAND <span>CRU</span></div>
    <div class="subtitle">Dashboard Las Cavas</div>
    <div class="input-group">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="Seu usuario" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="loading-msg" id="loadingMsg">Descriptografando dashboard...</div>
    <div class="login-footer">Acesso restrito - Las Cavas</div>
  </div>
</div>

const ENC_TAG = "FRhnKFlpZC9UraQCNoH7/w==";
const ITERATIONS = 100000;

function b64toArr(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0))}

async function hashUser(u){
  const enc=new TextEncoder();
  const hash=await crypto.subtle.digest('SHA-256',enc.encode(u.toLowerCase().trim()));
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function deriveKey(password,salt){
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:ITERATIONS,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},true,['decrypt']);
}

async function doLogin(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const errorEl=document.getElementById('errorMsg');
  const loadingEl=document.getElementById('loadingMsg');
  errorEl.textContent='';
  if(!username||!password){errorEl.textContent='Preencha usuario e senha.';return}
  
  document.getElementById('btnLogin').disabled=true;
  loadingEl.style.display='block';
  
  try{
    const hashHex=await hashUser(username);
    const user=USERS.find(u=>u.uh===hashHex);
    if(!user){throw new Error('not_found')}
    
    const salt=b64toArr(user.s);
    const userKey=await deriveKey(password,salt);
    
    // Decrypt the content key
    const ekIv=b64toArr(user.iv);
    const ekData=b64toArr(user.ek);
    const ekTag=b64toArr(user.tag);
    const ekCombined=new Uint8Array(ekData.length+ekTag.length);
    ekCombined.set(ekData);ekCombined.set(ekTag,ekData.length);
    
    const contentKeyRaw=await crypto.subtle.decrypt({name:'AES-GCM',iv:ekIv},userKey,ekCombined);
    const contentKey=await crypto.subtle.importKey('raw',contentKeyRaw,'AES-GCM',false,['decrypt']);
    
    // Decrypt dashboard content
    const iv=b64toArr(ENC_IV);
    const ct=b64toArr(ENC_CT);
    const tag=b64toArr(ENC_TAG);
    const combined=new Uint8Array(ct.length+tag.length);
    combined.set(ct);combined.set(tag,ct.length);
    
    const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},contentKey,combined);
    const html=new TextDecoder().decode(decrypted);
    
    document.getElementById('loginScreen').style.display='none';
    const dashEl=document.getElementById('dashContent');
    dashEl.style.display='block';
    dashEl.innerHTML=html;
    
    // Execute scripts in the decrypted content
    dashEl.querySelectorAll('script').forEach(oldScript=>{
      const newScript=document.createElement('script');
      if(oldScript.src)newScript.src=oldScript.src;
      else newScript.textContent=oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript,oldScript);
    });
    
  }catch(e){
    console.error(e);
    errorEl.textContent='Usuario ou senha incorretos.';
    document.getElementById('loginBox').classList.add('shake');
    setTimeout(()=>document.getElementById('loginBox').classList.remove('shake'),300);
  }finally{
    document.getElementById('btnLogin').disabled=false;
    loadingEl.style.display='none';
  }
}
</script>
